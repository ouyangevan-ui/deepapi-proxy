server {
    listen 80;
    server_name deepapi.click www.deepapi.click;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name deepapi.click www.deepapi.click;

    ssl_certificate     /etc/letsencrypt/live/deepapi.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deepapi.click/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS (31536000 seconds = 1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting: 30 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req zone=api_limit burst=50 nodelay;

    # Timeout
    proxy_connect_timeout 30s;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    client_body_timeout 60s;
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
