# Template rendered by deploy.sh. Do not install this file without replacing __DOMAIN__.
server {
    listen 80;
    server_name __SERVER_NAMES__;
    return 301 https://__DOMAIN__$request_uri;
}

server {
    listen 443 ssl http2;
    server_name __SERVER_NAMES__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    proxy_connect_timeout 30s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    client_body_timeout 60s;
    client_max_body_size 10m;

    location = /pricing {
        return 301 /pricing/;
    }

    location = /pricing/ {
        alias /var/www/deepapi-site/pricing/index.html;
        default_type text/html;
        add_header Cache-Control "no-cache";
    }

    # Repository-managed assets also replace the fixed image's fallback icons.
    location = /logo.png {
        alias /var/www/deepapi-brand/deepapi-logo.png;
        types { }
        default_type image/png;
        expires 1h;
    }

    location = /favicon.ico {
        alias /var/www/deepapi-brand/favicon.svg;
        types { }
        default_type image/svg+xml;
        expires 1h;
    }

    location = /favicon.svg {
        alias /var/www/deepapi-brand/favicon.svg;
        default_type image/svg+xml;
        expires 1h;
    }

    location = /brand/deepapi-logo.svg {
        alias /var/www/deepapi-brand/deepapi-logo.svg;
        default_type image/svg+xml;
        expires 1h;
    }

    location = /brand/deepapi-logo.png {
        alias /var/www/deepapi-brand/deepapi-logo.png;
        default_type image/png;
        expires 1h;
    }

    location = /brand/deepapi-icon.svg {
        alias /var/www/deepapi-brand/deepapi-icon.svg;
        default_type image/svg+xml;
        expires 1h;
    }

    location /v1/ {
        limit_req zone=api_limit burst=120 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location / {
        limit_req zone=web_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
