# Install to /etc/nginx/conf.d/deepapi-rate-limit-zones.conf.
# Ubuntu's nginx.conf includes /etc/nginx/conf.d/*.conf inside http {}.
# limit_req_zone is valid only in http {}, not inside server {}.

limit_req_zone $binary_remote_addr zone=web_limit:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=api_limit:20m rate=10r/s;
